# ParallelCluster Configuration — Day 1 (v3.0)
#
# r8i.32xlarge × 2, single queue, LoginNodes Count=1
#
# setup.sh substitutes placeholders and activates/strips
# #OPENZFS_BEGIN/#OPENZFS_END and #ONTAP_BEGIN/#ONTAP_END blocks based on config flags.
#
# Placeholders use stack-prefix-neutral keys (${BASE.*}, ${STORAGE.*}).
# setup.sh reads actual values from the stack names derived from STACK_PREFIX.
#
# SSH KeyPair private key:
#   aws ssm get-parameter --name /ec2/keypair/<KeyPairId> --with-decryption

Region: ap-northeast-2

Image:
  Os: rhel8

HeadNode:
  InstanceType: m7i.xlarge
  Ssh:
    KeyName: ${BASE.KeyPairName}
  Networking:
    SubnetId: ${BASE.PrimarySubnetId}
    AdditionalSecurityGroups:
      - ${BASE.SgClusterNodesId}
  #SSM_BEGIN
  #Iam:
  #  AdditionalIamPolicies:
  #    - Policy: arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
  #SSM_END
  LocalStorage:
    RootVolume:
      VolumeType: gp3
      Size: 500
      Iops: 6000
      Throughput: 250

#LOGINNODES_BEGIN
# ParallelCluster 3.15+: LoginNodes no longer supports KeyName.
# Two options for Login Node access:
#   1) Custom OnNodeConfigured script that copies HeadNode's
#      ~ec2-user/.ssh/authorized_keys from a shared FSx path
#   2) AWS Directory Service (AD/SSSD) integration for centralized user accounts
# For immediate access, use the HeadNode directly (same KeyPair).
LoginNodes:
  Pools:
    - Name: users
      Count: 1
      InstanceType: r7i.2xlarge
      Networking:
        SubnetIds:
          - ${BASE.PrimarySubnetId}
        AdditionalSecurityGroups:
          - ${BASE.SgClusterNodesId}
#LOGINNODES_END

SharedStorage:
  #OPENZFS_BEGIN
  - Name: fsxz-tools
    StorageType: FsxOpenZfs
    MountDir: /fsxz/tools
    FsxOpenZfsSettings:
      VolumeId: ${STORAGE.VolToolsId}

  - Name: fsxz-work
    StorageType: FsxOpenZfs
    MountDir: /fsxz/work
    FsxOpenZfsSettings:
      VolumeId: ${STORAGE.VolWorkId}

  - Name: fsxz-scratch
    StorageType: FsxOpenZfs
    MountDir: /fsxz/scratch
    FsxOpenZfsSettings:
      VolumeId: ${STORAGE.VolScratchId}
  #OPENZFS_END
  #ONTAP_BEGIN
  - Name: fsxn-tools
    StorageType: FsxOntap
    MountDir: /fsxn/tools
    FsxOntapSettings:
      VolumeId: ${STORAGE.OntapVolToolsId}

  - Name: fsxn-work
    StorageType: FsxOntap
    MountDir: /fsxn/work
    FsxOntapSettings:
      VolumeId: ${STORAGE.OntapVolWorkId}

  - Name: fsxn-scratch
    StorageType: FsxOntap
    MountDir: /fsxn/scratch
    FsxOntapSettings:
      VolumeId: ${STORAGE.OntapVolScratchId}
  #ONTAP_END

Monitoring:
  Logs:
    CloudWatch:
      Enabled: true
      RetentionInDays: 90
      DeletionPolicy: Retain
  Dashboards:
    CloudWatch:
      Enabled: true

Scheduling:
  Scheduler: slurm
  SlurmSettings:
    ScaledownIdletime: 15
    EnableMemoryBasedScheduling: true
    QueueUpdateStrategy: TERMINATE
    # Required for internet-less subnets — Route 53 has no VPC endpoint,
    # so ParallelCluster's managed DNS is disabled and EC2 hostnames are used instead
    Dns:
      DisableManagedDns: true
      UseEc2Hostnames: true

  SlurmQueues:
    - Name: eda-r8i
      CapacityType: ONDEMAND
      JobExclusiveAllocation: false
      Networking:
        SubnetIds:
          - ${BASE.PrimarySubnetId}
        AdditionalSecurityGroups:
          - ${BASE.SgClusterNodesId}
      ComputeSettings:
        LocalStorage:
          RootVolume:
            VolumeType: gp3
            Size: 200
            Iops: 3000
            Throughput: 125
      ComputeResources:
        - Name: r128
          InstanceType: r8i.32xlarge
          MinCount: 0
          MaxCount: 2
          DisableSimultaneousMultithreading: false
